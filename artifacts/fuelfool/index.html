<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>FuelTru — Uncover the True Cost of Your Daily Drive</title>
    <meta name="description" content="FuelTru calculates the exact gas cost of any road trip. Enter your ZIP for live EIA gas prices, pick your vehicle for EPA-verified MPG, enter your route, and uncover the true cost of your daily drive." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.fueltru.com/" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, Slack, etc.) -->
    <meta property="og:title" content="FuelTru — Uncover the True Cost of Your Daily Drive" />
    <meta property="og:description" content="Calculate the real gas cost of your next road trip in seconds. Live gas prices, EPA-verified MPG, actual driving distance — plus EV comparison and trade-in estimate." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.fueltru.com/" />
    <meta property="og:image" content="https://www.fueltru.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="FuelTru" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FuelTru — Uncover the True Cost of Your Daily Drive" />
    <meta name="twitter:description" content="Calculate the real gas cost of your next road trip in seconds. Live gas prices, EPA-verified MPG, actual driving distance — plus EV comparison and trade-in estimate." />
    <meta name="twitter:image" content="https://www.fueltru.com/opengraph.jpg" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />

    <!-- Apple / iOS home screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="FuelTru" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Android / PWA -->
    <meta name="theme-color" content="#20BF55" />

    <!-- Structured data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FuelTru",
      "url": "https://www.fueltru.com/",
      "description": "Free gas trip cost calculator. Enter your ZIP for live EIA gas prices, pick your vehicle for EPA-rated MPG, enter your route for real driving distance, and uncover the true cost of your daily drive.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any web browser",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "featureList": [
        "Live regional gas prices from U.S. EIA",
        "EPA-rated MPG for any vehicle year, make, model, and trim",
        "Real driving distance via Google Maps",
        "Round-trip fuel cost calculation",
        "Electric vehicle cost comparison with per-mile savings",
        "Carbon footprint comparison between gas and EV",
        "Estimated vehicle trade-in value toward an EV down payment",
        "Local EV dealership lookup (Tesla, Rivian, Polestar, and more)"
      ]
    }
    </script>
    <!-- Structured data: HowTo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to Calculate Road Trip Gas Cost with FuelTru",
      "description": "Calculate the exact fuel cost for any road trip using live gas prices, EPA MPG, and real driving distance.",
      "totalTime": "PT2M",
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Enter your ZIP code",
          "text": "Enter your 5-digit ZIP code to retrieve the current regional average gas price from the U.S. Energy Information Administration (EIA) weekly survey."
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Select your vehicle",
          "text": "Choose your vehicle year, make, model, and trim to retrieve the EPA combined MPG rating from FuelEconomy.gov."
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Enter your route",
          "text": "Enter your starting address and destination. FuelTru uses Google Maps to calculate the actual driving distance on real roads."
        },
        {
          "@type": "HowToStep",
          "position": 4,
          "name": "See your full results",
          "text": "FuelTru calculates: Gas Cost = (Miles ÷ MPG) × Price per Gallon, including round-trip toggle, an EV cost and carbon footprint comparison, an estimated trade-in value for your current vehicle toward an EV, and nearby EV dealerships."
        }
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
