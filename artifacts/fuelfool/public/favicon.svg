<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Jade Green background -->
  <rect width="512" height="512" fill="#20BF55"/>

  <!-- Fuel gauge: original viewBox 100x60, scaled 4.2x, centered in 512x512 -->
  <!-- Offset: x=46, y=130 so gauge occupies (46→466, 130→382) -->
  <g transform="translate(46, 130) scale(4.2)">

    <!-- Outer arc -->
    <path d="M 8 52 A 42 42 0 0 1 92 52"
          stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>

    <!-- Tick marks at 0°/30°/60°/90°/120°/150°/180° -->
    <!-- 180° (left end) — major -->
    <line x1="16" y1="52" x2="8" y2="52"
          stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 150° — minor -->
    <line x1="20.56" y1="35" x2="13.63" y2="31"
          stroke="#ffffffaa" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 120° — minor -->
    <line x1="33" y1="22.56" x2="29" y2="15.63"
          stroke="#ffffffaa" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 90° (top) — major -->
    <line x1="50" y1="18" x2="50" y2="10"
          stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 60° — minor -->
    <line x1="67" y1="22.56" x2="71" y2="15.63"
          stroke="#ffffffaa" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 30° — minor -->
    <line x1="79.44" y1="35" x2="86.37" y2="31"
          stroke="#ffffffaa" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 0° (right end) — major -->
    <line x1="84" y1="52" x2="92" y2="52"
          stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Needle pointing toward "empty" (~150°) -->
    <line x1="50" y1="52" x2="24.02" y2="37"
          stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Center pivot -->
    <circle cx="50" cy="52" r="3.5" fill="#ffffff"/>

    <!-- Gas pump icon — lower-left -->
    <g transform="translate(17, 38)" fill="#ffffff">
      <rect x="0" y="2" width="7" height="9" rx="1"/>
      <rect x="1" y="0" width="5" height="2.5" rx="0.5"/>
      <path d="M 7 3.5 Q 10 3.5 10 6 L 10 9"
            stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <rect x="9" y="8" width="2.5" height="1.5" rx="0.5"/>
    </g>

  </g>
</svg>
