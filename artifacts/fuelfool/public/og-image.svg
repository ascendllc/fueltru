<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F1117"/>
  <!-- Subtle grid texture -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.07"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Green accent bar at top -->
  <rect x="0" y="0" width="1200" height="6" fill="#20BF55"/>

  <!-- Speedometer icon, left-aligned -->
  <g transform="translate(80, 175) scale(4.5)">
    <path d="M 8 52 A 42 42 0 0 1 92 52" stroke="#20BF55" stroke-width="5" stroke-linecap="round"/>
    <line x1="16" y1="52" x2="8" y2="52" stroke="#20BF55" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20.56" y1="35" x2="13.63" y2="31" stroke="#20BF5588" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="33" y1="22.56" x2="29" y2="15.63" stroke="#20BF5588" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="50" y1="18" x2="50" y2="10" stroke="#20BF55" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="67" y1="22.56" x2="71" y2="15.63" stroke="#20BF5588" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="79.44" y1="35" x2="86.37" y2="31" stroke="#20BF5588" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="84" y1="52" x2="92" y2="52" stroke="#20BF55" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="52" x2="24.02" y2="37" stroke="#20BF55" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="50" cy="52" r="3.5" fill="#20BF55"/>
    <g transform="translate(17, 38)" fill="#20BF55">
      <rect x="0" y="2" width="7" height="9" rx="1"/>
      <rect x="1" y="0" width="5" height="2.5" rx="0.5"/>
      <path d="M 7 3.5 Q 10 3.5 10 6 L 10 9" stroke="#20BF55" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <rect x="9" y="8" width="2.5" height="1.5" rx="0.5"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="530" y="270" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="128" fill="#20BF55" letter-spacing="-2">FuelTru</text>

  <!-- Tagline -->
  <text x="533" y="340" font-family="Arial, sans-serif" font-weight="400"
        font-size="32" fill="#9CA3AF" letter-spacing="1">Uncover the True Cost of Your Daily Drive</text>

  <!-- Description -->
  <text x="533" y="420" font-family="Arial, sans-serif" font-weight="400"
        font-size="28" fill="#6B7280">Enter your ZIP, pick your car, and plan your route</text>
  <text x="533" y="460" font-family="Arial, sans-serif" font-weight="400"
        font-size="28" fill="#6B7280">to see the real cost of your next trip.</text>

  <!-- URL -->
  <text x="533" y="540" font-family="Arial, sans-serif" font-weight="400"
        font-size="24" fill="#3066BE" letter-spacing="1">www.fueltru.com</text>

  <!-- Bottom green bar -->
  <rect x="0" y="624" width="1200" height="6" fill="#20BF55" opacity="0.4"/>
</svg>
